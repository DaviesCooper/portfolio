services:
  app:
    build: .
    ports:
      - "3000:8080"
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Optional: mount built assets for live updates without rebuilding the image.
    # Build locally (npm run server:build && npm run build) then uncomment:
