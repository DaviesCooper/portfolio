# Development: live code updates without rebuilding the image.
# Server: mount ./server, nodemon restarts on .ts changes.
# VFS: mount ./frontends/vfs, Vite HMR at http://localhost:5173 (desktop + mobile view via ?mobile=1).
# Lasers: mount ./frontends/lasers, Vite HMR at http://localhost:5174.
#
# Usage: docker compose -f docker-compose.dev.yml up --build -d   (background)
# Or:    docker compose -f docker-compose.dev.yml up --build     (foreground, logs in terminal)
# Then:  server http://localhost:3001 | vfs http://localhost:5173 | lasers http://localhost:5174
# Logs:  docker compose -f docker-compose.dev.yml logs -f

services:
  server:
    build:
      context: .
      target: dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./server:/app/server
    command: ["npx", "nodemon", "--exec", "tsx server/index.ts", "-w", "server", "-e", "ts"]

  vfs:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://server:3000
    volumes:
      - ./frontends/vfs:/app/frontends/vfs
    command: ["sh", "-c", "cd frontends/vfs && npm install && npm run dev"]
    depends_on:
      - server

  lasers:
    build:
      context: .
      target: dev
    ports:
      - "5174:5174"
    environment:
      - VITE_API_PROXY_TARGET=http://server:3000
    volumes:
      - ./frontends/lasers:/app/frontends/lasers
    command: ["sh", "-c", "cd frontends/lasers && npm install && npm run dev"]
    depends_on:
      - server
